        <h2>Getting Started</h2>
        <h3>What is Friendlinq?</h3>
        <p>Friendlinq is a free, ad-free social network designed for adults who want a simpler, safer way to stay connected. It features messaging, community groups, video and audio calls, live streaming, photo sharing, a marketplace, and event discovery. No ads, no data selling, no algorithms.</p>
        <h3>How do I sign up?</h3>
        <p>Visit <a href="/register">friendlinq.com/register</a> and enter your name, email, and password. Takes less than a minute.</p>
        <h3>Is Friendlinq really free?</h3>
        <p>Yes, completely. No subscription fees, no hidden charges, no premium tiers for core features.</p>
        <h3>Do I need to be tech-savvy?</h3>
        <p>Not at all. Large buttons, simple navigation, straightforward language, and a guided tutorial.</p>

        <h2>Features</h2>
        <h3>What can I do on Friendlinq?</h3>
        <p>Connect with friends and family, join community groups, share photos, send messages, make video and audio calls, host live streams, discover events, and browse the marketplace.</p>
        <h3>Can I make video calls?</h3>
        <p>Yes. Built-in video and audio calling — one-on-one or group. No additional apps needed.</p>
        <h3>What kinds of groups are available?</h3>
        <p>Gardening, travel, book clubs, cooking, health and wellness, local events, hobbies, and more.</p>
        <h3>Is there a mobile app?</h3>
        <p>Yes. Free on <a href="https://apps.apple.com/us/app/friendlinq/id6476931666">App Store</a> and <a href="https://play.google.com/store/apps/details?id=com.app.friendlinq">Google Play</a>.</p>
        <h3>Can my family members join?</h3>
        <p>Absolutely. Friendlinq is open to adults of all ages.</p>

        <h2>Safety and Privacy</h2>
        <h3>Is Friendlinq safe?</h3>
        <p>Yes. Enhanced privacy controls, community moderation, scam and spam protection. Your data is never sold.</p>
        <h3>Does Friendlinq sell my data?</h3>
        <p>No. We do not sell data, show ads, or track behavior for advertising.</p>
        <h3>How do I report or block someone?</h3>
        <p>Block from their profile, report via the report button, or email <a href="mailto:info@friendlinq.com">info@friendlinq.com</a>.</p>
        <h3>Can I delete my account?</h3>
        <p>Yes. Settings > Delete Account removes your profile, posts, photos, and data.</p>

        <h2>Comparison</h2>
        <h3>How is Friendlinq different from Facebook?</h3>
        <p>Cleaner navigation, larger text, no algorithms, no ads, privacy controls that actually protect you. Facebook is built around engagement metrics — Friendlinq is built around you.</p>
        <h3>Does Friendlinq use algorithms?</h3>
        <p>No. Your feed is chronological. No manipulation, no boosted content.</p>

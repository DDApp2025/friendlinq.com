<!DOCTYPE html>

    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a6b3a" />
    <meta name="description" content="Friendlinq is the social network for adults who value simplicity, safety, and real connection. Connect with friends and family, join community groups, share photos, and discover events — all in a simple, safe interface. Free to join.">
    <meta name="keywords" content="social network, simple social media, safe social platform, private social network, online community, connect with friends, social media no ads, social network no data selling, Friendlinq">

    <meta name="application-name" content="Friendlinq">
    <meta name="apple-mobile-web-app-title" content="Friendlinq">
    <link rel="canonical" href="https://friendlinq.com/">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://friendlinq.com/">
    <meta property="og:title" content="Friendlinq | The Social Network Built for Real Connection">
    <meta property="og:description" content="Simple, safe social media for adults. Connect with friends, join groups, share photos, discover events — free to join, no ads, no data selling.">
    <meta property="og:image" content="https://friendlinq.com/og-image.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Friendlinq - The Social Network Built for Real Connection">
    <meta property="og:site_name" content="Friendlinq">
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Friendlinq | The Social Network Built for Real Connection">
    <meta name="twitter:description" content="Simple, safe social media. Connect, share, discover — free to join.">
    <meta name="twitter:image" content="https://friendlinq.com/og-image.jpg">
    <meta name="twitter:image:alt" content="Friendlinq - The Social Network Built for Real Connection">
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Friendlinq | The Social Network Built for Real Connection</title>
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location))
    </script>
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>

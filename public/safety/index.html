        <h1>Your safety and privacy on Friendlinq</h1>
        <p>Your safety is our top priority. Friendlinq is built from the ground up to protect your privacy, keep you safe from scams and spam, and give you full control over your experience.</p>

        <h2>How we protect you from scams and spam</h2>
        <ul>
          <li>Automated detection of spam accounts and suspicious behavior</li>
          <li>One-tap reporting of any user or content that seems wrong</li>
          <li>Quick response from our moderation team on reported issues</li>
        </ul>

        <h2>Your privacy controls</h2>
        <ul>
          <li><strong>Post privacy:</strong> Choose whether each post is visible to the community or only to your friends.</li>
          <li><strong>Private portfolio:</strong> A separate private photo album only approved friends can see.</li>
          <li><strong>Friend requests:</strong> You control who can connect with you.</li>
          <li><strong>Block and report:</strong> Block any user instantly and report content that violates guidelines.</li>
        </ul>

        <h2>How we handle your data</h2>
        <p><strong>What we collect:</strong> Name, email, profile info you choose to share, photos, and messages — only what is needed.</p>
        <p><strong>How we use it:</strong> To deliver messages, show posts, connect you with groups, and keep the platform safe.</p>
        <p><strong>What we do NOT do:</strong> We do not sell your data. We do not show ads. We do not use algorithms to manipulate your feed.</p>

        <h2>How to report problems</h2>
        <ol>
          <li><strong>Block a user:</strong> Go to their profile and tap block.</li>
          <li><strong>Report content:</strong> Tap the report button on any post, message, or profile.</li>
          <li><strong>Contact support:</strong> Email <a href="mailto:info@friendlinq.com">info@friendlinq.com</a>.</li>
        </ol>

        <h2>Tips for staying safe online</h2>
        <ul>
          <li>Use a strong, unique password</li>
          <li>Never share your password with anyone</li>
          <li>Be cautious about sharing personal information</li>
          <li>Do not click suspicious links — report them</li>
          <li>Trust your instinct and report anything that feels wrong</li>
        </ul>
